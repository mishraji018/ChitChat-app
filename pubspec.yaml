name: chitchat
description: 'ChitChat - Chat with your favorite people 🐻'
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.0
  dio: ^5.4.1
  socket_io_client: ^2.0.3+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  emoji_picker_flutter: ^2.0.0
  flutter_slidable: ^3.0.1
  intl: ^0.18.1
  timeago: ^3.6.1
  pinput: ^3.0.1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  badges: ^3.1.2
  permission_handler: ^11.3.0
  local_auth: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon_light.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/app_icon_light.png"
  min_sdk_android: 21
  web:
    generate: false
